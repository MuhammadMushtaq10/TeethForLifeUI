<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/tooth.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Teeth For Life — Healthy Smiles, Lasting Care. Book your dental appointment online." />
    <title>Teeth For Life — Dental Clinic</title>
    <script>
      // Apply saved/system theme before paint to avoid a flash of the wrong theme.
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-gray-50 text-text-main">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
